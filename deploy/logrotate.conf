# EduConsult OS — Logrotate Yapılandırması
#
# Kullanım (sistem geneli logrotate'e entegre etmek için):
#   sudo cp /var/www/edconsult-os/deploy/logrotate.conf /etc/logrotate.d/edconsult-os
#   sudo logrotate -d /etc/logrotate.d/edconsult-os  # test (dry-run)
#   sudo logrotate -f /etc/logrotate.d/edconsult-os  # zorla çalıştır
#
# NOT: PM2'nin pm2-logrotate modülü yüklendiğinde bu dosya pm2-logrotate'in
# yerini almaz; ikisi birlikte çalışabilir. pm2-logrotate PM2 process başına
# rotate eder, bu dosya ise logs/ dizininin tamamını yönetir.
#
# pm2-logrotate kurulumu (deploy.sh tarafından otomatik yapılır):
#   pm2 install pm2-logrotate
#   pm2 set pm2-logrotate:max_size 10M
#   pm2 set pm2-logrotate:retain 14
#   pm2 set pm2-logrotate:compress true

/var/www/edconsult-os/logs/*.log {
    # Her gün rotate et
    daily

    # 14 gün boyunca sakla
    rotate 14

    # Eski logları sıkıştır (gzip)
    compress

    # Bir önceki rotasyonu sonraki gün sıkıştır (I/O çakışmasını önler)
    delaycompress

    # Log dosyası yoksa hata verme
    missingok

    # Dosya boşsa rotate etme
    notifempty

    # PM2 ile uyumlu: dosyayı kopyala+kes (process yeniden açmak zorunda kalmaz)
    # postrotate/SIGHUP yerine bu kullanılır çünkü PM2 cluster mode'da
    # SIGHUP her zaman doğru çalışmaz.
    copytruncate

    # Shared scripts (birden fazla log dosyası için tek postrotate)
    sharedscripts

    postrotate
        # pm2-logrotate kurulu değilse PM2'ye log dosyalarını yeniden açmasını söyle
        # (copytruncate zaten bunu gereksiz kılar ama güvenlik olarak bırakılır)
        /usr/bin/pm2 reloadLogs > /dev/null 2>&1 || true
    endscript
}

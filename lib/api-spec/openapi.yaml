      tags: [inbox, ai]
      summary: Generate (or return cached) AI summary for a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Summary generated or returned from cache
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummarizeInboxConversationResponse"
        "400":
          description: No messages to summarize
          content:
            application/json:

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
      required:
        - total
        - page
        - limit
        - totalPages

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        replitId:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        role:
          type: string
        avatarUrl:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        language:
          type: string
        isActive:
          type: boolean
        agentStaffPermissions:
          type: ["array", "null"]
          items:
            type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - role
        - language
        - isActive
        - createdAt

    CreateUserBody:
      type: object
      properties:
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
        phone:
          type: ["string", "null"]
        language:
          type: string
      required:
        - email
        - firstName
        - lastName
        - role
        - language

    UpdateUserBody:
      type: object
      properties:
        email:
          type: ["string", "null"]
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        role:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        language:
          type: ["string", "null"]
        isActive:
          type: ["boolean", "null"]

    UsersListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/UserProfile"
        meta:
          $ref: "#/components/schemas/PaginationMeta"
      required:
        - data
        - meta

    Lead:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        nationality:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        source:
          type: ["string", "null"]
        status:
          type: string
        assignedToId:
          type: ["integer", "null"]
        interestedProgram:
          type: ["string", "null"]
        interestedUniversity:
          type: ["string", "null"]
        interestedCountry:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        estimatedValue:
          type: ["number", "null"]
        convertedStudentId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - firstName
        - lastName
        - status
        - createdAt
        - updatedAt

    CreateLeadBody:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        nationality:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        source:
          type: ["string", "null"]
        status:
          type: string
        assignedToId:
          type: ["integer", "null"]
        interestedProgram:
          type: ["string", "null"]
        interestedUniversity:
          type: ["string", "null"]
        interestedCountry:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        estimatedValue:
          type: ["number", "null"]
      required:
        - firstName
        - lastName
        - status

    UpdateLeadBody:

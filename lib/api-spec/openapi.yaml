    post:
      operationId: createProgram
      tags: [universities]
      summary: Create program
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProgramBody"
      responses:
        "201":
          description: Created program
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Program"

  /programs/{id}:
    get:
      operationId: getProgram
      tags: [universities]

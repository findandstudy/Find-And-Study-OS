            type: integer
      responses:
        "200":
          description: Program
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Program"
    patch:
      operationId: updateProgram
      tags: [universities]
      summary: Update program
      parameters:
        - name: id
          in: path
          required: true
